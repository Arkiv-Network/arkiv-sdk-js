name: Network Health Check

on:
  schedule:
    # Every 6 hours
    - cron: "0 */6 * * *"
  workflow_dispatch:
    inputs:
      chain:
        description: "Chain to test"
        required: false
        default: "kaolin"
        type: choice
        options:
          - kaolin
          - mendoza
          - rosario

jobs:
  network-health:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        chain: ${{ github.event_name == 'workflow_dispatch' && fromJson(format('["{0}"]', inputs.chain)) || fromJson('["kaolin"]') }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v1
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install

      - name: Build package for tests
        run: bun run package:test

      - name: Install test dependencies
        run: cd test && bun install --frozen-lockfile

      - name: Run network health CRUD test
        env:
          PRIVATE_KEY: ${{ secrets.NETWORK_HEALTH_PRIVATE_KEY }}
          CHAIN: ${{ matrix.chain }}
        run: cd test && bun run test:network-health
